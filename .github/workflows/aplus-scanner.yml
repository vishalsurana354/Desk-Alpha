name: A+ Scanner

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Stock symbol to scan (e.g., TATAPOWER.NS, GOOGL, BTC-USD, XAU-USD)'
        required: false
        default: ''

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install yfinance pandas numpy requests
      - name: Run A+ Scanner
        run: python aplus_scanner.py --symbol "${{ github.event.inputs.symbol }}"
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
